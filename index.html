<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bronts Cash</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:'Segoe UI',Tahoma;
background:linear-gradient(180deg,#f7f9fc,#eef2f7);
direction:rtl;
padding-bottom:100px;
}

/* Toast */

.toast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
padding:15px 25px;
border-radius:15px;
font-weight:bold;
display:none;
z-index:9999;
color:white;
}

.success{background:#00a884}
.fail{background:#e53935}

/* Loader */

.loader{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(135deg,#00a884,#00d09c);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
z-index:999;
}

.internet-loader{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(135deg,#00a884,#00d09c);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
z-index:9999;
}

.spinner{
width:50px;
height:50px;
border:5px solid rgba(255,255,255,.3);
border-top:5px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg)}
}

.header{
padding:25px 20px 10px;
font-size:24px;
font-weight:bold;
}

.card{
background:linear-gradient(135deg,#00a884,#00d09c);
margin:15px;
padding:30px;
border-radius:30px;
color:white;
}

.balance{
font-size:36px;
margin:15px 0;
font-weight:bold;
}

.buttons{
display:flex;
gap:12px;
}

.btn{
flex:1;
padding:16px;
border:none;
border-radius:18px;
background:white;
color:#00a884;
font-weight:bold;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
}

.white{
background:white;
margin:15px;
padding:22px;
border-radius:25px;
}

.transaction{
display:flex;
justify-content:space-between;
padding:14px 0;
border-bottom:1px solid #eee;
}

.up{color:#00a884}
.down{color:red}

.nav{
position:fixed;
bottom:15px;
left:15px;
right:15px;
background:white;
padding:12px;
display:flex;
justify-content:space-around;
border-radius:25px;
box-shadow:0 10px 25px rgba(0,0,0,.12);
}

.nav button{
background:none;
border:none;
font-size:22px;
}

.popup{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,.4);
display:none;
justify-content:center;
align-items:center;
}

.popup-box{
background:white;
padding:25px;
border-radius:25px;
width:85%;
}

.popup-box input{
width:100%;
padding:14px;
margin-top:12px;
border-radius:12px;
border:1px solid #eee;
}

.popup-box button{
margin-top:12px;
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#00a884;
color:white;
}

</style>
</head>

<body>

<div id="toast" class="toast"></div>

<div class="loader" id="loader">
<i class="fa-solid fa-wallet" style="font-size:40px"></i>
<div class="spinner"></div>
<h3>Bronts Cash</h3>
</div>

<div class="internet-loader" id="internetLoader">
<i class="fa-solid fa-wifi" style="font-size:40px"></i>
<div class="spinner"></div>
<h3>انتظار الاتصال بالانترنت...</h3>
</div>

<div id="app" style="display:none">

<div class="header">
<i class="fa-solid fa-chart-line"></i>
Bronts Cash
</div>

<div id="home">

<div class="card">
<div>
<i class="fa-solid fa-wallet"></i>
الرصيد المتوفر
</div>

<div id="balance" class="balance">0 MAD</div>

<div class="buttons">
<button class="btn" onclick="openPopup('add')">
<i class="fa-solid fa-plus"></i>
إضافة
</button>

<button class="btn" onclick="openPopup('remove')">
<i class="fa-solid fa-minus"></i>
خصم
</button>
</div>

</div>

<div class="white">
<h3>
<i class="fa-solid fa-clock"></i>
المعاملات
</h3>

<div id="list"></div>

</div>
</div>

<div id="goal" style="display:none">

<div class="white">
<h3>
<i class="fa-solid fa-bullseye"></i>
الهدف
</h3>

<div id="goalText">لا يوجد هدف</div>
<h2 id="countdown"></h2>
<div id="endTime"></div>

<button class="btn" onclick="openPopup('goal')">
<i class="fa-solid fa-flag"></i>
إضافة هدف
</button>

</div>
</div>

</div>

<div class="popup" id="popup">
<div class="popup-box">

<input id="amount" placeholder="المبلغ">
<input id="days" placeholder="الأيام">
<input id="hours" placeholder="الساعات">
<input id="minutes" placeholder="الدقائق">

<button onclick="confirm()">حفظ</button>
<button onclick="closePopup()">إلغاء</button>

</div>
</div>

<div class="nav">
<button onclick="showPage('home')">
<i class="fa-solid fa-house"></i>
</button>

<button onclick="showPage('goal')">
<i class="fa-solid fa-bullseye"></i>
</button>

<button onclick="showPage('home')">
<i class="fa-solid fa-wallet"></i>
</button>
</div>

<script>

let balanceValue=0
let transactions=[]
let goalAmount=0
let goalTime=0
let type=""
let countdownInterval

window.onload=()=>{
setTimeout(()=>{
loader.style.display="none"
checkInternet()
loadData()
},1500)
}

/* Internet */

function checkInternet(){

if(!navigator.onLine){
internetLoader.style.display="flex"
app.style.display="none"
}else{
internetLoader.style.display="none"
app.style.display="block"
}

}

window.addEventListener("offline",()=>{
internetLoader.style.display="flex"
app.style.display="none"
})

window.addEventListener("online",()=>{
internetLoader.style.display="none"
app.style.display="block"
showToast("تم الاتصال بالانترنت","success")
})

/* Toast */

function showToast(text,type="success"){
toast.innerText=text
toast.className="toast "+type
toast.style.display="block"

setTimeout(()=>{
toast.style.display="none"
},3000)
}

/* Storage */

function saveData(){
localStorage.setItem("balance",balanceValue)
localStorage.setItem("transactions",JSON.stringify(transactions))
localStorage.setItem("goalAmount",goalAmount)
localStorage.setItem("goalTime",goalTime)
}

function loadData(){

balanceValue=parseInt(localStorage.getItem("balance"))||0
transactions=JSON.parse(localStorage.getItem("transactions"))||[]
goalAmount=parseInt(localStorage.getItem("goalAmount"))||0
goalTime=parseInt(localStorage.getItem("goalTime"))||0

update()

transactions.forEach(t=>addTransaction(t.val,t.plus))

if(goalAmount){

goalText.innerText="الهدف "+goalAmount+" MAD"

let endDate=new Date(goalTime)
endTime.innerText="ينتهي في: "+endDate.toLocaleString()

startCountdown()

}

}

/* Popup */

function openPopup(t){

type=t
amount.value=""
days.value=""
hours.value=""
minutes.value=""

popup.style.display="flex"

if(t!="goal"){
days.style.display="none"
hours.style.display="none"
minutes.style.display="none"
}else{
days.style.display="block"
hours.style.display="block"
minutes.style.display="block"
}

}

function closePopup(){
popup.style.display="none"
}

function confirm(){

let value=parseInt(amount.value)
if(!value)return

if(type=="add"){
balanceValue+=value
addTransaction(value,true)
}

if(type=="remove"){
balanceValue-=value
addTransaction(value,false)
}

if(type=="goal"){

let d=parseInt(days.value)||0
let h=parseInt(hours.value)||0
let m=parseInt(minutes.value)||0

goalAmount=value

goalTime=new Date().getTime()
+(d*24*60*60*1000)
+(h*60*60*1000)
+(m*60*1000)

goalText.innerText="الهدف "+goalAmount+" MAD"

let endDate=new Date(goalTime)
endTime.innerText="ينتهي في: "+endDate.toLocaleString()

startCountdown()

}

update()
saveData()
closePopup()

}

function update(){
balance.innerText=balanceValue+" MAD"
}

function addTransaction(val,plus){

transactions.push({val,plus})

let div=document.createElement("div")
div.className="transaction"

if(plus){
div.innerHTML="<span>"+val+" MAD</span><span class='up'><i class='fa-solid fa-arrow-up'></i></span>"
}else{
div.innerHTML="<span>"+val+" MAD</span><span class='down'><i class='fa-solid fa-arrow-down'></i></span>"
}

list.prepend(div)

}

function startCountdown(){

clearInterval(countdownInterval)

countdownInterval=setInterval(()=>{

let now=new Date().getTime()
let distance=goalTime-now

let days=Math.floor(distance/(1000*60*60*24))
let hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60))
let minutes=Math.floor((distance%(1000*60*60))/(1000*60))
let seconds=Math.floor((distance%(1000*60))/1000)

countdown.innerText=
days+" يوم "+
hours+" ساعة "+
minutes+" دقيقة "+
seconds+" ثانية"

if(distance<=0){

clearInterval(countdownInterval)

if(balanceValue>=goalAmount){
alert("لقد نجحت في الهدف")
showToast("تمت المهمة","success")
}else{
alert("انتهى وقت الهدف")
showToast("انتهت المهمة","fail")
}

goalAmount=0
goalTime=0

goalText.innerText="لا يوجد هدف"
countdown.innerText=""
endTime.innerText=""

localStorage.removeItem("goalAmount")
localStorage.removeItem("goalTime")

return

}

},1000)

}

function showPage(p){

home.style.display="none"
goal.style.display="none"

document.getElementById(p).style.display="block"

}

</script>

</body>
</html>
