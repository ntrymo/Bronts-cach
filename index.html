<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bronts Cash</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f8;
direction:rtl;
padding-bottom:90px;
}

/* شاشة البداية */

.loader{
position:fixed;
width:100%;
height:100%;
background:white;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999;
}

.logo{
width:120px;
margin-bottom:20px;
}

.spinner{
width:50px;
height:50px;
border:5px solid #eee;
border-top:5px solid #00a884;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg)}
}

/* header */

.header{
padding:20px;
font-size:22px;
font-weight:bold;
}

/* card */

.card{
background:linear-gradient(135deg,#00a884,#00c896);
margin:15px;
padding:25px;
border-radius:25px;
color:white;
}

.balance{
font-size:32px;
margin:10px 0;
}

.buttons{
display:flex;
gap:10px;
}

.btn{
flex:1;
padding:15px;
border:none;
border-radius:20px;
background:white;
color:#00a884;
font-weight:bold;
}

/* white */

.white{
background:white;
margin:15px;
padding:20px;
border-radius:20px;
}

.transaction{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid #eee;
}

.up{
color:#00a884;
}

.down{
color:red;
}

/* nav */

.nav{
position:fixed;
bottom:0;
width:100%;
background:white;
padding:15px;
display:flex;
justify-content:space-around;
box-shadow:0 -2px 10px rgba(0,0,0,.1);
}

.nav button{
background:none;
border:none;
font-size:24px;
}

/* popup */

.popup{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,.4);
display:none;
justify-content:center;
align-items:center;
}

.popup-box{
background:white;
padding:20px;
border-radius:20px;
width:85%;
}

.popup-box input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
}

.popup-box button{
margin-top:10px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#00a884;
color:white;
}

</style>

</head>

<body>

<!-- Splash -->

<div class="loader" id="loader">
<img src="smok.png" class="logo">
<div class="spinner"></div>
<h3>Bronts Cash</h3>
</div>

<div id="app" style="display:none">

<div class="header">
Bronts Cash
</div>

<!-- home -->

<div id="home">

<div class="card">

<div>الرصيد المتوفر</div>

<div id="balance" class="balance">
0 MAD
</div>

<div class="buttons">

<button class="btn" onclick="openPopup('add')">
+ إضافة
</button>

<button class="btn" onclick="openPopup('remove')">
- خصم
</button>

</div>

</div>

<div class="white">

<h3>المعاملات</h3>

<div id="list"></div>

</div>

</div>

<!-- goal -->

<div id="goal" style="display:none">

<div class="white">

<h3>🎯 الهدف</h3>

<div id="goalText">لا يوجد هدف</div>

<h2 id="countdown"></h2>

<button class="btn"
onclick="openPopup('goal')">
إضافة هدف
</button>

</div>

</div>

</div>

<!-- popup -->

<div class="popup" id="popup">

<div class="popup-box">

<input id="amount"
placeholder="المبلغ">

<input id="days"
placeholder="الأيام">

<input id="hours"
placeholder="الساعات">

<input id="minutes"
placeholder="الدقائق">

<button onclick="confirm()">حفظ</button>

<button onclick="closePopup()">إلغاء</button>

</div>

</div>

<!-- nav -->

<div class="nav">

<button onclick="showPage('home')">
🏠
</button>

<button onclick="showPage('goal')">
🎯
</button>

<button onclick="showPage('home')">
💰
</button>

</div>

<script>

let balanceValue=0
let transactions=[]
let goalAmount=0
let goalTime=0
let type=""

/* loader */

window.onload=()=>{

setTimeout(()=>{

loader.style.display="none"
app.style.display="block"

loadData()

},1500)

}

/* save */

function saveData(){

localStorage.setItem("balance",balanceValue)
localStorage.setItem("transactions",JSON.stringify(transactions))
localStorage.setItem("goalAmount",goalAmount)
localStorage.setItem("goalTime",goalTime)

}

/* load */

function loadData(){

balanceValue=parseInt(localStorage.getItem("balance"))||0
transactions=JSON.parse(localStorage.getItem("transactions"))||[]
goalAmount=parseInt(localStorage.getItem("goalAmount"))||0
goalTime=parseInt(localStorage.getItem("goalTime"))||0

update()

transactions.forEach(t=>addTransaction(t.val,t.plus))

if(goalAmount){
goalText.innerText="الهدف "+goalAmount+" MAD"
startCountdown()
}

}

/* popup */

function openPopup(t){

type=t

amount.value=""
days.value=""
hours.value=""
minutes.value=""

popup.style.display="flex"

if(t!="goal"){
days.style.display="none"
hours.style.display="none"
minutes.style.display="none"
}else{
days.style.display="block"
hours.style.display="block"
minutes.style.display="block"
}

}

function closePopup(){
popup.style.display="none"
}

/* confirm */

function confirm(){

let value=parseInt(amount.value)

if(!value)return

if(type=="add"){
balanceValue+=value
addTransaction(value,true)
}

if(type=="remove"){
balanceValue-=value
addTransaction(value,false)
}

if(type=="goal"){

let d=parseInt(days.value)||0
let h=parseInt(hours.value)||0
let m=parseInt(minutes.value)||0

goalAmount=value

goalTime=new Date().getTime()
+(d*24*60*60*1000)
+(h*60*60*1000)
+(m*60*1000)

goalText.innerText="الهدف "+goalAmount+" MAD"

startCountdown()

}

update()
saveData()

closePopup()

}

/* update */

function update(){
document.getElementById("balance").innerText=
balanceValue+" MAD"
}

/* transaction */

function addTransaction(val,plus){

transactions.push({val,plus})

let div=document.createElement("div")
div.className="transaction"

if(plus){
div.innerHTML="<span>"+val+" MAD</span><span class='up'>↑</span>"
}else{
div.innerHTML="<span>"+val+" MAD</span><span class='down'>↓</span>"
}

list.prepend(div)

}

/* countdown */

function startCountdown(){

setInterval(()=>{

let now=new Date().getTime()
let distance=goalTime-now

let days=Math.floor(distance/(1000*60*60*24))
let hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60))
let minutes=Math.floor((distance%(1000*60*60))/(1000*60))
let seconds=Math.floor((distance%(1000*60))/1000)

countdown.innerText=
days+" يوم "+
hours+" ساعة "+
minutes+" دقيقة "+
seconds+" ثانية"

if(balanceValue>=goalAmount){
alert("🎉 مبروك وصلت للهدف")
}

},1000)

}

/* pages */

function showPage(p){

home.style.display="none"
goal.style.display="none"

document.getElementById(p).style.display="block"

}

</script>

</body>
</html>
